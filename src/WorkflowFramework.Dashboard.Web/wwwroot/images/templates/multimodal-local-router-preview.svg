<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal Local Router preview</title>
  <desc id="desc">A local-first multimodal routing workflow with specialist model handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.45" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)" />
  <circle cx="1120" cy="124" r="180" fill="#0f766e" opacity="0.18" />
  <circle cx="980" cy="618" r="210" fill="#7c3aed" opacity="0.16" />

  <text x="72" y="96" fill="#e2e8f0" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Multimodal Local Router</text>
  <text x="72" y="136" fill="#93c5fd" font-size="20" font-family="Segoe UI, Arial, sans-serif">Cheap local routing first, premium specialist passes second.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="214" width="220" height="108" rx="20" fill="url(#node)" stroke="#38bdf8" stroke-width="2" />
    <text x="106" y="252" fill="#bae6fd" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Capture Brief</text>
    <text x="106" y="280" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">recordings + transcript</text>
    <text x="106" y="304" fill="#64748b" font-size="13" font-family="Segoe UI, Arial, sans-serif">normalize multimodal intake</text>

    <rect x="352" y="214" width="220" height="108" rx="20" fill="url(#node)" stroke="#38bdf8" stroke-width="2" />
    <text x="380" y="252" fill="#bae6fd" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Route Brief</text>
    <text x="380" y="280" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">Ollama phi4-mini</text>
    <text x="380" y="304" fill="#64748b" font-size="13" font-family="Segoe UI, Arial, sans-serif">decide draft vs audit path</text>

    <rect x="626" y="214" width="236" height="108" rx="20" fill="url(#node)" stroke="#22c55e" stroke-width="2" />
    <text x="654" y="252" fill="#bbf7d0" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Plan Specialist Passes</text>
    <text x="654" y="280" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">Ollama llama3.2</text>
    <text x="654" y="304" fill="#64748b" font-size="13" font-family="Segoe UI, Arial, sans-serif">build execution plan from local route</text>

    <rect x="936" y="148" width="252" height="108" rx="20" fill="url(#node)" stroke="#a855f7" stroke-width="2" />
    <text x="964" y="186" fill="#e9d5ff" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Draft with OpenAI</text>
    <text x="964" y="214" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">gpt-4o-mini</text>
    <text x="964" y="238" fill="#64748b" font-size="13" font-family="Segoe UI, Arial, sans-serif">primary deliverable pass</text>

    <rect x="936" y="314" width="252" height="108" rx="20" fill="url(#node)" stroke="#f59e0b" stroke-width="2" />
    <text x="964" y="352" fill="#fde68a" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Audit with Anthropic</text>
    <text x="964" y="380" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">Claude Sonnet</text>
    <text x="964" y="404" fill="#64748b" font-size="13" font-family="Segoe UI, Arial, sans-serif">risk + follow-up review</text>

    <rect x="812" y="520" width="284" height="110" rx="20" fill="url(#node)" stroke="#14b8a6" stroke-width="2" />
    <text x="840" y="558" fill="#99f6e4" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Merge Specialist Outputs</text>
    <text x="840" y="586" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">combine draft and audit</text>
    <text x="840" y="610" fill="#64748b" font-size="13" font-family="Segoe UI, Arial, sans-serif">handoff package for human review</text>
  </g>

  <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.95">
    <path d="M298 268 H352" />
    <path d="M572 268 H626" />
    <path d="M862 240 C902 240, 900 202, 936 202" />
    <path d="M862 296 C902 296, 900 368, 936 368" />
    <path d="M1062 422 V472 C1062 500, 1040 500, 1010 520" />
    <path d="M1062 256 V472 C1062 500, 1030 500, 986 520" />
  </g>

  <g>
    <rect x="72" y="564" width="306" height="88" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <text x="100" y="602" fill="#f8fafc" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Why it is featured</text>
    <text x="100" y="628" fill="#94a3b8" font-size="14" font-family="Segoe UI, Arial, sans-serif">Demonstrates local-first provider routing,</text>
    <text x="100" y="648" fill="#94a3b8" font-size="14" font-family="Segoe UI, Arial, sans-serif">parallel specialist passes, and prompt wiring.</text>
  </g>
</svg>
